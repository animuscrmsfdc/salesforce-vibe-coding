# Runs on every Pull Request targeting main.
# Performs a check-only deploy (no changes committed to org) and runs all local Apex tests.
# The PR cannot be merged if this workflow fails.

name: Validate PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'force-app/**'
      - 'manifest/**'

jobs:
  validate:
    name: Validate metadata & run Apex tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install sf CLI
        run: npm install -g @salesforce/cli --prefer-global

      - name: Install Salesforce Code Analyzer
        run: sf plugins install @salesforce/sfdx-scanner --no-prompt

      - name: Run PMD static analysis
        run: |
          sf scanner run \
            --target "force-app/main/default/classes,force-app/main/default/triggers" \
            --engine pmd \
            --pmdconfig pmd-ruleset.xml \
            --format sarif \
            --outfile pmd-results.sarif \
            --normalize-severity \
            --severity-threshold 2

      - name: Upload PMD results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-results
          path: pmd-results.sarif

      - name: Authenticate to dev org via SFDX Auth URL
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./auth-url.txt --alias dev-org --set-default
          rm ./auth-url.txt

      - name: Validate deploy (check-only, RunLocalTests)
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org dev-org \
            --dry-run \
            --test-level RunLocalTests \
            --wait 30 \
            --json

      - name: Report results
        if: always()
        run: sf project deploy report --use-most-recent --json || true
