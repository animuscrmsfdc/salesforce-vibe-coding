# Can be triggered manually from GitHub Actions UI (workflow_dispatch).
# Also runs nightly at 06:00 UTC to catch any org drift.

name: Run Apex Tests

on:
  workflow_dispatch:
    inputs:
      test_class:
        description: 'Specific test class to run (leave empty to run all)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'

jobs:
  test:
    name: Run Apex tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install sf CLI
        run: npm install -g @salesforce/cli --prefer-global

      - name: Authenticate to dev org via SFDX Auth URL
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          sf org login sfdx-url --sfdx-url-file <(echo "$SFDX_AUTH_URL") --alias dev-org --set-default

      - name: Run all Apex tests with coverage
        if: ${{ inputs.test_class == '' }}
        run: |
          sf apex run test \
            --target-org dev-org \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format human \
            --wait 20

      - name: Run specific Apex test class
        if: ${{ inputs.test_class != '' }}
        run: |
          sf apex run test \
            --class-names "${{ inputs.test_class }}" \
            --target-org dev-org \
            --code-coverage \
            --result-format human \
            --wait 20
